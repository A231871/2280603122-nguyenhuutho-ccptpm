name: CI/CD Pipeline BaiTap7

# KÍCH HOẠT: Chạy khi push lên nhánh main
on:
  push:
    branches: [ "main" ]
  # Cho phép chạy thủ công bằng nút bấm (như bạn đã hỏi trước đó)
  workflow_dispatch:

# PHÂN QUYỀN: Cần quyền này để GitHub Actions có thể deploy lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

# CẤU HÌNH CHO GITHUB PAGES
env:
  # Đây là cấu hình mặc định, giúp job deploy biết dùng version nào
  GITHUB_PAGES_DEPLOYMENT: true

jobs:
  # JOB 1: BUILD (Tương đương Stage Build trong GitLab)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Build Artifact
        run: |
          echo "Building project..."
          # Giả lập build hoặc kiểm tra file
          if [ -f "public/index.html" ]; then echo "HTML exists"; else exit 1; fi
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          # Upload thư mục 'public' để job Deploy dùng
          path: './public'

  # JOB 2: DEPLOY (Tương đương Stage Deploy trong GitLab)
  # Chỉ chạy sau khi Job Build thành công
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # Ràng buộc: Phải đợi build xong mới chạy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2